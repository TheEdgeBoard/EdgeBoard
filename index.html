<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Edge Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .sport-tab { transition: all 0.3s; }
        .sport-tab.active { color: #34d399; border-bottom: 2px solid #34d399; }
    </style>
</head>
<body class="text-white min-h-screen">

       <div id="login-gate" class="text-center py-20 min-h-[60vh] flex flex-col justify-center items-center">
        <h2 class="text-5xl md:text-7xl font-black mb-8 orbitron tracking-tighter text-white">
            BEAT THE <span class="text-emerald-500">BOOKS.</span>
        </h2>
        <p class="text-gray-500 mb-10 text-sm uppercase tracking-widest">
            Data-Driven Sports Analytics & Probability Models
        </p>
        <div class="flex justify-center gap-4">
            <button onclick="openModal('login-modal')" class="bg-emerald-500 text-black font-black px-8 py-3 rounded hover:bg-emerald-400 transition-transform hover:scale-105">
                SIGN IN
            </button>
            <button onclick="openModal('reg-modal')" class="bg-gray-800 text-white font-bold px-8 py-3 rounded border border-gray-700 hover:bg-gray-700 transition-transform hover:scale-105">
                REGISTER
            </button>
        </div>
    </div>
    <div id="dashboard-content" class="hidden max-w-6xl mx-auto p-6">
        
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <h1 class="text-2xl font-black orbitron tracking-tighter text-white">THE <span class="text-emerald-400">EDGE</span> BOARD</h1>
            <div class="flex items-center gap-4">
                <span class="text-xs text-gray-500" id="display-user"></span>
                <button id="logout-btn" onclick="logout()" class="text-xs text-gray-400 hover:text-white">LOGOUT</button>
            </div>
        </header>

        <div class="flex gap-6 mb-8">
            <button onclick="changeSport('NBA')" id="tab-NBA" class="sport-tab active pb-2 text-sm font-bold">NBA</button>
            <button onclick="changeSport('MLB')" id="tab-MLB" class="sport-tab pb-2 text-sm font-bold text-gray-600 hover:text-gray-400">MLB</button>
            <button onclick="changeSport('NHL')" id="tab-NHL" class="sport-tab pb-2 text-sm font-bold text-gray-600 hover:text-gray-400">NHL</button>
        </div>

        <div id="admin-controls" class="hidden mb-6 flex gap-3">
            <button onclick="apiCall('/api/sync/odds')" class="bg-blue-900/50 text-blue-400 border border-blue-800 text-[10px] px-4 py-2 rounded hover:bg-blue-900">SYNC ODDS</button>
            <button onclick="apiCall('/api/sync/stats')" class="bg-emerald-900/50 text-emerald-400 border border-emerald-800 text-[10px] px-4 py-2 rounded hover:bg-emerald-900">SYNC STATS</button>
        </div>

        <div class="flex gap-2 mb-6 items-center">
            <span class="text-[10px] text-gray-500 uppercase mr-2">Trend Filter:</span>
            <button onclick="setTrend(3)" id="t-3" class="t-btn bg-gray-800 text-gray-400 text-[10px] px-3 py-1 rounded">L3</button>
            <button onclick="setTrend(5)" id="t-5" class="t-btn bg-gray-800 text-gray-400 text-[10px] px-3 py-1 rounded">L5</button>
            <button onclick="setTrend(10)" id="t-10" class="t-btn bg-emerald-600 text-white font-bold text-[10px] px-3 py-1 rounded">L10 (80%)</button>
            <button onclick="setTrend(14)" id="t-14" class="t-btn bg-gray-800 text-gray-400 text-[10px] px-3 py-1 rounded">L14</button>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-sm">
                <thead class="bg-gray-800/50 text-[10px] uppercase text-gray-500 tracking-widest">
                    <tr>
                        <th class="p-5 text-left">Player</th>
                        <th class="p-5 text-left">Line</th>
                        <th class="p-5 text-center cursor-pointer hover:text-white" onclick="sortData('win_rate_10')">Sim Prob ↕</th>
                        <th class="p-5 text-center cursor-pointer hover:text-white" onclick="sortData('ev_10')">EV Edge ↕</th>
                        <th class="p-5 text-center">Best Odds</th>
                        <th class="p-5 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        
        <div class="mt-8 text-center text-[10px] text-gray-600">
            <a href="/tos" class="hover:text-gray-400 mx-2">Terms of Service</a> | 
            <a href="/about" class="hover:text-gray-400 mx-2">About Us</a>
        </div>
    </div>
    <div id="login-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-full max-w-sm shadow-2xl relative">
            <button onclick="closeModal('login-modal')" class="absolute top-4 right-4 text-gray-500 hover:text-white">✕</button>
            <h3 class="orbitron text-xl mb-6 tracking-tighter text-white">Welcome Back</h3>
            <input id="l-user" type="text" placeholder="Username" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white focus:border-emerald-500 outline-none">
            <input id="l-pass" type="password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-6 text-white focus:border-emerald-500 outline-none">
            <button onclick="auth('login')" class="w-full bg-emerald-500 text-black font-bold py-3 rounded hover:bg-emerald-400">SIGN IN</button>
        </div>
    </div>

    <div id="reg-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-full max-w-md shadow-2xl relative">
            <button onclick="closeModal('reg-modal')" class="absolute top-4 right-4 text-gray-500 hover:text-white">✕</button>
            <h3 class="orbitron text-xl mb-6 tracking-tighter text-white">Request Access</h3>
            <input id="r-name" type="text" placeholder="Full Name" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white focus:border-emerald-500 outline-none">
            <input id="r-email" type="email" placeholder="Email Address" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white focus:border-emerald-500 outline-none">
            <input id="r-user" type="text" placeholder="Requested Username" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-4 text-white focus:border-emerald-500 outline-none">
            
            <div class="flex items-center gap-2 mb-6">
                <input type="checkbox" id="tos-agree" class="rounded bg-gray-800 border-gray-700 accent-emerald-500">
                <label for="tos-agree" class="text-[10px] text-gray-400">I agree to the <a href="/tos" target="_blank" class="text-emerald-400 underline">Terms of Service</a></label>
            </div>

            <button onclick="requestAccess()" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-500">SUBMIT REQUEST</button>
        </div>
    </div>
    <script>
        let rawData = [];
        let trendWin = 10; // Default filter window

        // AUTH & INIT
        window.onload = () => {
            const u = localStorage.getItem('user');
            if(u) {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('display-user').innerText = u;
                
                // Show Admin Buttons Only if Role is Admin
                if(localStorage.getItem('role') === 'admin') {
                    document.getElementById('admin-controls').classList.remove('hidden');
                }
                loadData();
            }
        };

        async function login() {
            const u = document.getElementById('u_in').value;
            const p = document.getElementById('p_in').value;
            const res = await fetch('/api/login', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({username:u, password:p})
            });
            const data = await res.json();
            if(data.status === 'success') {
                localStorage.setItem('user', data.username);
                localStorage.setItem('role', data.role);
                location.reload();
            } else {
                document.getElementById('l_msg').innerText = data.message;
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // DATA LOGIC
        async function loadData() {
            const body = document.getElementById('table-body');
            // 1. Show Loading
            body.innerHTML = `<tr><td colspan="6" class="p-20 text-center animate-pulse text-emerald-500 font-bold orbitron">SCANNING LIVE MARKETS...</td></tr>`;

            try {
                // 2. Try to get Real Data
                const res = await fetch('/api/data?sport=NBA');
                if (!res.ok) throw new Error("Server Error"); 
                rawData = await res.json();
                
                // 3. If Real Data is empty, say so
                if (!rawData || rawData.length === 0) {
                     body.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-gray-500 orbitron">NO GAMES FOUND FOR TOMORROW</td></tr>`;
                     return;
                }
            } catch (e) {
                // 4. If Error, show Error (DO NOT SHOW FAKE BETS)
                console.error(e);
                body.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-red-500 font-bold orbitron">CONNECTION ERROR: CHECK SERVER</td></tr>`;
                return;
            }
            
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            
            // 1. Check for "No Games"
            if(rawData.length === 0) {
                body.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-gray-500 orbitron">NO PLAYS AVAILABLE</td></tr>`;
                return;
            }

            // 2. Filter Data
            const filtered = rawData.filter(d => {
                // Hide if user hid it locally
                if(localStorage.getItem(`hide_${d.player_name}`)) return false;
                
                // Trend Logic (The "8 of 10" rule)
                if(!d.trend_history) return true; // Show if no history to be safe
                const hits = d.trend_history.split(',').slice(0, trendWin).map(Number).reduce((a,b)=>a+b, 0);
                
                if(trendWin === 3 && hits < 2) return false;
                if(trendWin === 5 && hits < 4) return false;
                if(trendWin === 10 && hits < 8) return false;
                if(trendWin === 14 && hits < 11) return false;
                
                return true;
            });

            if(filtered.length === 0) {
                 body.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-gray-500 orbitron">NO BETS FIT TREND FILTER</td></tr>`;
                 return;
            }

            // 3. Render Rows (Optimized)
            const rows = filtered.map(d => `
                <tr class="border-b border-gray-800 hover:bg-emerald-500/5 transition-colors">
                    <td class="p-5 font-bold text-white">
                        ${d.player_name} 
                        <div class="text-[10px] text-gray-500 font-normal">${d.team_name || 'NBA'}</div>
                    </td>
                    <td class="p-5">
                        <div class="text-[10px] text-gray-500 uppercase">${d.prop_type}</div>
                        <div class="text-emerald-400 font-bold">${d.suggestion} ${d.market_line}</div>
                    </td>
                    <td class="p-5 text-center text-blue-400 font-black">${(d.win_rate_10*100).toFixed(1)}%</td>
                    <td class="p-5 text-center text-emerald-400 font-black">+${(d.ev_10 || 0).toFixed(1)}%</td>
                    <td class="p-5 text-center">
                        <div class="text-white font-bold text-xs">${d.best_odds || '-'}</div>
                        <div class="text-[9px] text-gray-500 uppercase">${d.sportsbook || 'Market'}</div>
                    </td>
                    <td class="p-5 text-right">
                        <button onclick="hideBet('${d.player_name}')" class="text-[10px] text-gray-600 hover:text-red-500 font-bold">HIDE</button>
                    </td>
                </tr>
            `).join('');
            
            body.innerHTML = rows;

        function setTrend(n) {
            trendWin = n;
            // Reset button styles
            document.querySelectorAll('.t-btn').forEach(b => {
                b.className = 't-btn bg-gray-800 text-gray-400 text-[10px] px-3 py-1 rounded';
            });
            // Highlight active
            document.getElementById(`t-${n}`).className = 't-btn bg-emerald-600 text-white font-bold text-[10px] px-3 py-1 rounded';
            renderTable();
        }

       let sortDir = 1; // 1 = High to Low, -1 = Low to High
        function sortData(key) {
            sortDir *= -1; // Flip direction
            rawData.sort((a,b) => (b[key] - a[key]) * sortDir);
            renderTable();
        }

        function hideBet(name) {
            localStorage.setItem(`hide_${name}`, 'true');
            renderTable();
        }

        function changeSport(s) {
            document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active', 'text-emerald-400'));
            document.getElementById(`tab-${s}`).classList.add('active');
            if(s !== 'NBA') { 
                document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="p-20 text-center text-gray-500 orbitron">COMING SOON</td></tr>`;
            } else {
                loadData();
            }
        }
        
        async function apiCall(url) {
            const res = await fetch(url, {method:'POST'});
            const d = await res.json();
            alert(d.message || d.status);
        }
        // MODAL FUNCTIONS
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    // REGISTRATION LOGIC
    async function requestAccess() {
        const payload = {
            full_name: document.getElementById('r-name').value,
            email: document.getElementById('r-email').value,
            requested_username: document.getElementById('r-user').value
        };
        if(!payload.full_name || !payload.email || !payload.requested_username) {
            alert("Please fill in all fields."); return;
        }
        if(!document.getElementById('tos-agree').checked) {
            alert("Please agree to the Terms of Service."); return;
        }
        const res = await fetch('/api/register', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
        });
        const data = await res.json();
        alert(data.message);
        if(data.status === 'success') closeModal('reg-modal');
    }
    </script>
</body>
</html>
