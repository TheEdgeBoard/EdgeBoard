<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeBoard | Pro Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="orbitron text-xl font-bold text-emerald-400 tracking-tighter">EDGE BOARD</h1>
            <div id="auth-controls" class="flex gap-4">
                <button onclick="logout()" id="logout-btn" class="hidden text-xs text-gray-400 hover:text-white uppercase font-bold">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="login-gate" class="text-center py-20">
            <h2 class="text-4xl font-bold mb-6">Master the Market.</h2>
            <button onclick="openLogin()" class="bg-emerald-500 text-black font-bold px-8 py-3 rounded-lg hover:bg-emerald-400 transition-all">SIGN IN TO DASHBOARD</button>
        </div>

        <div id="dashboard-content" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex gap-2">
                    <button onclick="triggerSync('odds')" class="bg-blue-600 text-[10px] font-bold px-3 py-1 rounded">SYNC ODDS</button>
                    <button onclick="triggerSync('stats')" class="bg-emerald-600 text-[10px] font-bold px-3 py-1 rounded">SYNC STATS</button>
                </div>
                <select id="window-select" onchange="renderTable()" class="bg-gray-800 text-xs p-2 rounded border border-gray-700">
                    <option value="5">L5 Games</option>
                    <option value="10" selected>L10 Games</option>
                </select>
            </div>

            <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden shadow-2xl">
                <table class="w-full text-left">
                    <thead class="bg-gray-800 text-[10px] uppercase text-gray-500 tracking-widest">
                        <tr>
                            <th class="p-4">Player</th>
                            <th class="p-4">Market</th>
                            <th class="p-4 text-center">Trend (L5)</th>
                            <th class="p-4 text-right">EV Edge</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-full max-w-sm">
            <h3 class="orbitron text-lg mb-6">Member Login</h3>
            <input id="user" type="text" placeholder="Username" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3">
            <input id="pass" type="password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-6">
            <button onclick="login()" class="w-full bg-emerald-500 text-black font-bold py-3 rounded">ENTER</button>
        </div>
    </div>

    <script>
        let rawData = [];
        
        async function login() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('user').value, password: document.getElementById('pass').value})
            });
            const data = await res.json();
            if(data.status === 'success') {
                localStorage.setItem('user', data.username);
                location.reload();
            }
        }

        function checkAuth() {
            if(localStorage.getItem('user')) {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                loadData();
            }
        }

        async function loadData() {
            const res = await fetch('/api/data');
            rawData = await res.json();
            renderTable();
        }

        function renderTable() {
            const win = document.getElementById('window-select').value;
            const body = document.getElementById('table-body');
            body.innerHTML = '';

            rawData.forEach((d, i) => {
                const ev = d[`ev_${win}`] || 0;
                const canvasId = `chart-${i}`;
                const row = `
                    <tr class="border-b border-gray-800 hover:bg-emerald-500/5">
                        <td class="p-4 font-bold text-white">${d.player_name}</td>
                        <td class="p-4 text-xs text-gray-400">${d.prop_type} <span class="text-emerald-400">${d.suggestion}</span></td>
                        <td class="p-4 text-center"><canvas id="${canvasId}" width="100" height="30"></canvas></td>
                        <td class="p-4 text-right text-emerald-400 font-bold">+${ev.toFixed(1)}%</td>
                    </tr>
                `;
                body.innerHTML += row;

                setTimeout(() => {
                    const ctx = document.getElementById(canvasId).getContext('2d');
                    const trend = d.trend_history ? d.trend_history.split(',').map(Number) : [0,0,0,0,0];
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: trend,
                            datasets: [{ data: trend, borderColor: '#10b981', borderWidth: 2, pointRadius: 0, fill: false, tension: 0.4 }]
                        },
                        options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
                    });
                }, 0);
            });
        }

        async function triggerSync(type) {
            const res = await fetch(`/api/sync/${type}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            loadData();
        }

        function openLogin() { document.getElementById('login-modal').classList.remove('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
        checkAuth();
    </script>
</body>
</html>
