<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeBoard | Admin Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glow-emerald { box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        .hidden { display: none; }
        input::placeholder { color: #475569; }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-view" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl w-full max-w-md">
            <h1 class="orbitron text-3xl font-bold text-center mb-8 text-emerald-400 tracking-tighter">EDGEBOARD</h1>
            <div class="space-y-4">
                <input type="text" id="username" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white focus:border-emerald-500 outline-none" placeholder="Operator ID">
                <input type="password" id="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white focus:border-emerald-500 outline-none" placeholder="Access Code">
                <button onclick="handleLogin()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-all">INITIALIZE</button>
            </div>
        </div>
    </div>

    <div id="dashboard-view" class="hidden">
        <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="orbitron text-xl font-bold text-emerald-400">EDGEBOARD <span class="text-[10px] text-gray-500 ml-2 uppercase" id="user-badge"></span></h1>
                <div class="flex gap-4">
                    <button id="admin-sync-btn" onclick="triggerSync()" class="hidden bg-emerald-600/10 text-emerald-400 text-xs font-bold px-4 py-2 rounded border border-emerald-500/30">🔄 SYNC DATA</button>
                    <button onclick="location.reload()" class="text-gray-500 hover:text-white text-xs font-bold uppercase">Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 space-y-8">
            
            <section id="admin-onboarding" class="hidden bg-gray-900 p-8 rounded-2xl border border-emerald-500/20 glow-emerald">
                <h3 class="orbitron text-xs text-emerald-400 mb-6 tracking-widest uppercase">New Client Onboarding</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <input type="text" id="reg-fullname" placeholder="Full Name" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm outline-none focus:border-emerald-500">
                    <input type="email" id="reg-email" placeholder="Client Email" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm outline-none focus:border-emerald-500">
                    <input type="tel" id="reg-phone" placeholder="Phone (Optional)" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm outline-none focus:border-emerald-500">
                    <input type="text" id="reg-username" placeholder="Username" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm outline-none focus:border-emerald-500 font-bold">
                    <input type="text" id="reg-password" placeholder="Password" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm outline-none focus:border-emerald-500">
                    <button onclick="createNewUser()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg text-xs tracking-widest uppercase">Send Verification Code</button>
                </div>
            </section>

            <section id="admin-directory" class="hidden bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
                <div class="p-4 bg-gray-800/50 border-b border-gray-800">
                    <h3 class="orbitron text-[10px] text-gray-400 tracking-widest uppercase">Active Client Directory</h3>
                </div>
                <table class="w-full text-left">
                    <thead class="text-[10px] text-gray-500 uppercase border-b border-gray-800">
                        <tr>
                            <th class="p-4">Name / Contact</th>
                            <th class="p-4">Credentials</th>
                            <th class="p-4 text-right">Management</th>
                        </tr>
                    </thead>
                    <tbody id="user-list-body" class="text-sm"></tbody>
                </table>
            </section>

            <section class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-2xl">
                <table class="w-full text-left">
                    <thead class="bg-gray-800/50 text-gray-500 text-[10px] uppercase tracking-widest">
                        <tr>
                            <th class="p-4">Player</th>
                            <th class="p-4">Market Line</th>
                            <th class="p-4">Projected</th>
                            <th class="p-4 text-right">Edge</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body"></tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="verify-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-gray-900 p-8 rounded-2xl border border-emerald-500 w-full max-w-sm shadow-[0_0_50px_rgba(16,185,129,0.2)]">
            <h2 class="orbitron text-xl font-bold mb-2 text-center text-white">Security Code</h2>
            <p class="text-gray-400 text-center text-sm mb-6">Check the client's email for the 6-digit activation code.</p>
            <input type="text" id="verify-code" maxlength="6" class="w-full bg-gray-800 border-2 border-emerald-500/50 p-4 text-center text-3xl tracking-[0.5em] rounded-xl text-emerald-400 font-bold mb-6 outline-none focus:border-emerald-500 transition-all" placeholder="000000">
            <button onclick="confirmCode()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all">ACTIVATE ACCOUNT</button>
            <button onclick="document.getElementById('verify-modal').classList.add('hidden')" class="w-full mt-4 text-gray-500 text-xs uppercase font-bold">Cancel</button>
        </div>
    </div>

    <script>
        // --- AUTH ---
        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if (res.ok) {
                sessionStorage.setItem('userRole', data.role);
                sessionStorage.setItem('userName', data.username);
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                setupUI(data.role, data.username);
                loadAnalytics();
            } else { alert("Login Failed"); }
        }

        function setupUI(role, name) {
            document.getElementById('user-badge').innerText = `${name} | ${role}`;
            if (role === 'admin') {
                document.getElementById('admin-onboarding').classList.remove('hidden');
                document.getElementById('admin-directory').classList.remove('hidden');
                document.getElementById('admin-sync-btn').classList.remove('hidden');
                loadUserList();
            }
        }

        // --- CRM ACTIONS ---
        async function createNewUser() {
            const payload = {
                full_name: document.getElementById('reg-fullname').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                username: document.getElementById('reg-username').value,
                password: document.getElementById('reg-password').value
            };
            sessionStorage.setItem('pendingUser', payload.username);
            const res = await fetch('/api/create-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-User-Role': sessionStorage.getItem('userRole')},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.status === 'pending') document.getElementById('verify-modal').classList.remove('hidden');
            else alert(data.message);
        }

        async function confirmCode() {
            const username = sessionStorage.getItem('pendingUser');
            const code = document.getElementById('verify-code').value;
            const res = await fetch('/api/verify-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, code})
            });
            const data = await res.json();
            if (data.status === 'success') {
                alert("Client Verified!");
                location.reload();
            } else alert(data.message);
        }

        async function loadUserList() {
            const res = await fetch('/api/get-users', { headers: {'X-User-Role': 'admin'} });
            const users = await res.json();
            const body = document.getElementById('user-list-body');
            body.innerHTML = users.map(u => `
                <tr class="border-b border-gray-800 hover:bg-gray-800/30 transition-all">
                    <td class="p-4">
                        <div class="font-bold text-white">${u.full_name}</div>
                        <div class="text-xs text-gray-500">${u.email} | ${u.phone}</div>
                    </td>
                    <td class="p-4 font-mono text-emerald-500 text-xs">${u.username} / ${u.password}</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteUser('${u.username}')" class="text-red-500 text-[10px] font-bold uppercase tracking-tighter">Revoke</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteUser(user) {
            if (!confirm(`Revoke access for ${user}?`)) return;
            await fetch(`/api/delete-user/${user}`, { 
                method: 'DELETE', 
                headers: {'X-User-Role': 'admin'} 
            });
            loadUserList();
        }

        // --- DATA ---
        async function loadAnalytics() {
            const res = await fetch('/api/data');
            const data = await res.json();
            document.getElementById('data-table-body').innerHTML = data.map(d => `
                <tr class="border-b border-gray-800 hover:bg-gray-800/20">
                    <td class="p-4"><div class="font-bold">${d.player_name}</div><div class="text-[10px] text-gray-500">${d.team}</div></td>
                    <td class="p-4 text-xs text-gray-400">${d.line_value} ${d.prop_type}</td>
                    <td class="p-4 text-emerald-400 font-bold">${d.projected_value}</td>
                    <td class="p-4 text-right font-bold ${d.ev_edge > 5 ? 'text-emerald-500' : 'text-yellow-500'}">${d.ev_edge}%</td>
                </tr>
            `).join('');
        }

        async function triggerSync() {
            const btn = document.getElementById('admin-sync-btn');
            btn.innerText = "⏳ SYNCING...";
            await fetch('/api/sync', { method: 'POST', headers: {'X-User-Role': 'admin'} });
            btn.innerText = "🔄 SYNC DATA";
            loadAnalytics();
        }
    </script>
</body>
</html>
