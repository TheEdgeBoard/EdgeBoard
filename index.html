<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeBoard | Multi-Sim Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-40 shadow-xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="orbitron text-xl font-bold text-emerald-400 tracking-tighter">EDGE BOARD</h1>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-gray-800 px-4 py-2 rounded border border-gray-700 shadow-inner">
                    <span class="text-[10px] text-gray-400 uppercase font-bold">Sim Basis:</span>
                    <select id="sim-window-select" onchange="renderTable()" class="bg-transparent text-sm text-emerald-400 font-bold outline-none cursor-pointer">
                        <option value="3">Last 3 Games (Hot/Cold)</option>
                        <option value="5">Last 5 Games (Trend)</option>
                        <option value="10" selected>Last 10 Games (Standard)</option>
                        <option value="14">Last 14 Games (Stable)</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <button id="btn-odds" onclick="triggerSync('odds')" class="bg-blue-900/30 text-blue-400 text-[10px] font-bold px-3 py-2 rounded border border-blue-500/30 hover:bg-blue-800/50">SYNC ODDS</button>
                    <button id="btn-stats" onclick="triggerSync('stats')" class="bg-emerald-900/30 text-emerald-400 text-[10px] font-bold px-3 py-2 rounded border border-emerald-500/30 hover:bg-emerald-800/50">SYNC STATS</button>
                    <button onclick="location.reload()" class="text-gray-500 hover:text-white text-xs font-bold uppercase ml-2">LOGOUT</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-gray-800/50 text-gray-500 text-[10px] uppercase tracking-widest border-b border-gray-800">
                    <tr>
                        <th class="p-4">Player</th>
                        <th class="p-4">Market</th>
                        <th class="p-4 text-center">Hit Rate <span id="col-hit" class="text-emerald-500"></span></th>
                        <th class="p-4 text-center">Sim Win % <span id="col-win" class="text-emerald-500"></span></th>
                        <th class="p-4 text-right">EV Edge <span id="col-ev" class="text-emerald-500"></span></th>
                    </tr>
                </thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        let globalData = [];

        async function loadAnalytics() {
            const res = await fetch('/api/data');
            globalData = await res.json();
            renderTable();
        }

        function renderTable() {
            const w = document.getElementById('sim-window-select').value;
            
            // Update Headers
            document.getElementById('col-hit').innerText = `(L${w})`;
            document.getElementById('col-win').innerText = `(Based on L${w})`;
            document.getElementById('col-ev').innerText = `(L${w} EV)`;

            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';

            // Filter: Only show positive plays for this specific window
            const activeData = globalData
                .filter(d => d[`ev_${w}`] > 0)
                .sort((a, b) => b[`ev_${w}`] - a[`ev_${w}`]);

            if (activeData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500">No positive value plays found for the Last ${w} Games timeframe.</td></tr>`;
                return;
            }

            activeData.forEach(d => {
                const hits = d.suggestion === "OVER" ? d[`hits_${w}_over`] : d[`hits_${w}_under`];
                const total = parseInt(w);
                const ev = d[`ev_${w}`];
                const winRate = d[`win_rate_${w}`];

                let pickColor = d.suggestion === "OVER" ? "text-emerald-400" : "text-sky-400";
                let edgeColor = ev >= 10 ? "text-emerald-400 font-black" : "text-emerald-600 font-bold";
                let hitBadge = hits/total >= 0.6 ? "bg-emerald-500/20 text-emerald-400 border-emerald-500/50" : "bg-gray-800 text-gray-500 border-gray-700";

                const row = `
                <tr class="border-b border-gray-800 hover:bg-gray-800/30 transition-all">
                    <td class="p-4">
                        <div class="font-bold text-white text-sm">${d.player_name}</div>
                        <div class="text-[10px] text-gray-500">${d.team}</div>
                    </td>
                    <td class="p-4">
                        <div class="text-xs text-gray-300">${d.line_value} ${d.prop_type}</div>
                        <div class="${pickColor} font-black text-[10px] tracking-widest uppercase bg-gray-900 inline-block px-2 py-0.5 mt-1 rounded border border-gray-800">${d.suggestion}</div>
                    </td>
                    <td class="p-4 text-center">
                        <span class="inline-block px-2 py-1 rounded text-xs font-bold border ${hitBadge}">
                            ${hits}/${total}
                        </span>
                    </td>
                    <td class="p-4 text-center">
                        <div class="text-white font-bold text-sm">${winRate}%</div>
                        <div class="text-[9px] text-gray-500">Proj: ${d[`proj_${w}`]}</div>
                    </td>
                    <td class="p-4 text-right">
                        <div class="${edgeColor} text-sm">${ev.toFixed(1)}%</div>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        async function triggerSync(type) {
            const btn = document.getElementById(`btn-${type}`);
            const original = btn.innerText;
            btn.innerText = "⏳..."; 
            btn.disabled = true;
            try {
                const res = await fetch(`/api/sync/${type}`, { method: 'POST', headers: {'X-User-Role': 'admin'} });
                const data = await res.json();
                alert(data.message);
                if(type === 'stats') loadAnalytics();
            } catch (e) { alert("Error"); }
            btn.innerText = original;
            btn.disabled = false;
        }

        loadAnalytics();
    </script>
</body>
</html>
