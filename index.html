<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeBoard | Pro Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .modal { transition: opacity 0.3s ease-in-out; }
        .trend-canvas { filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.2)); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-40 shadow-xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <h1 class="orbitron text-xl font-bold text-emerald-400 tracking-tighter cursor-pointer" onclick="location.reload()">EDGE BOARD</h1>
                <span id="user-badge" class="hidden text-[10px] uppercase font-bold text-gray-400 bg-gray-800 px-2 py-1 rounded border border-gray-700"></span>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="filter-container" class="hidden flex items-center gap-2 bg-gray-800 px-4 py-2 rounded border border-gray-700 shadow-inner">
                    <span class="text-[10px] text-gray-500 uppercase font-bold">Sim Basis:</span>
                    <select id="sim-window-select" onchange="renderTable()" class="bg-transparent text-sm text-emerald-400 font-bold outline-none cursor-pointer">
                        <option value="3">Last 3 Games</option>
                        <option value="5">Last 5 Games</option>
                        <option value="10" selected>Last 10 Games</option>
                        <option value="14">Last 14 Games</option>
                    </select>
                </div>

                <div id="auth-buttons" class="flex gap-2">
                    <button onclick="openModal('modal-login')" class="text-xs font-bold text-gray-400 hover:text-white px-3 py-2 uppercase tracking-widest">Login</button>
                    <button onclick="openModal('modal-register')" class="bg-emerald-500 hover:bg-emerald-400 text-black text-xs font-bold px-4 py-2 rounded transition-all shadow-lg shadow-emerald-900/50">CREATE ACCOUNT</button>
                </div>

                <div id="admin-buttons" class="hidden flex gap-2">
                    <button id="btn-odds" onclick="triggerSync('odds')" class="hidden bg-blue-900/20 text-blue-400 text-[10px] font-bold px-3 py-2 rounded border border-blue-500/30 hover:bg-blue-800/50 uppercase">Sync Odds</button>
                    <button id="btn-stats" onclick="triggerSync('stats')" class="hidden bg-emerald-900/20 text-emerald-400 text-[10px] font-bold px-3 py-2 rounded border border-emerald-500/30 hover:bg-emerald-800/50 uppercase">Sync Stats</button>
                    <button onclick="logout()" class="text-gray-500 hover:text-white text-[10px] font-bold uppercase ml-2">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 w-full flex-grow">
        <div id="login-gate" class="text-center py-24">
            <h2 class="text-3xl font-bold text-white mb-4">Elite Betting Analytics</h2>
            <p class="text-gray-400 mb-8 max-w-md mx-auto">Access real-time EV edges and visual performance trends for every NBA player prop.</p>
            <button onclick="openModal('modal-register')" class="bg-emerald-500 text-black font-bold px-10 py-4 rounded-lg text-lg hover:scale-105 transition-transform">Get Started Free</button>
        </div>

        <div id="dashboard-content" class="hidden">
            <div class="overflow-x-auto bg-gray-900 rounded-xl border border-gray-800 shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-800/50 text-gray-500 text-[10px] uppercase tracking-[0.2em] border-b border-gray-800">
                        <tr>
                            <th class="p-4">Player / Team</th>
                            <th class="p-4">Market</th>
                            <th class="p-4 text-center">Trend (Last 5)</th>
                            <th class="p-4 text-center">Hit Rate <span id="col-hit" class="text-emerald-500"></span></th>
                            <th class="p-4 text-right">EV Edge <span id="col-ev" class="text-emerald-500"></span></th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-login" class="modal fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center backdrop-blur-md">
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 w-96 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6 orbitron tracking-tighter">Member Login</h2>
            <input id="login-user" type="text" placeholder="Username" class="w-full bg-gray-800 border border-gray-700 text-white p-3 rounded-lg mb-3 focus:border-emerald-500 outline-none">
            <input id="login-pass" type="password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 text-white p-3 rounded-lg mb-6 focus:border-emerald-500 outline-none">
            <button onclick="login()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-colors">ENTER PORTAL</button>
            <button onclick="closeModal('modal-login')" class="w-full text-gray-500 text-xs mt-4 hover:text-white">Cancel</button>
        </div>
    </div>

    <script>
        let globalData = [];
        let userRole = localStorage.getItem('role');
        let userName = localStorage.getItem('username');

        function checkAuth() {
            if (userRole) {
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('admin-buttons').classList.remove('hidden');
                document.getElementById('filter-container').classList.remove('hidden');
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('user-badge').innerText = userName;
                document.getElementById('user-badge').classList.remove('hidden');
                if (userRole === 'admin') {
                    document.getElementById('btn-odds').classList.remove('hidden');
                    document.getElementById('btn-stats').classList.remove('hidden');
                }
                loadAnalytics();
            }
        }

        async function loadAnalytics() {
            try {
                const res = await fetch('/api/data');
                globalData = await res.json();
                renderTable();
            } catch (e) { console.error("Data load failed"); }
        }

        function renderTable() {
            const w = document.getElementById('sim-window-select').value;
            document.getElementById('col-hit').innerText = `(L${w})`;
            document.getElementById('col-ev').innerText = `(L${w} % )`;

            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';

            const activeData = globalData
                .filter(d => d[`ev_${w}`] > 0)
                .sort((a, b) => b[`ev_${w}`] - a[`ev_${w}`]);

            if (activeData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-gray-500 font-bold">Waiting for games to resume...</td></tr>`;
                return;
            }

            activeData.forEach((d, index) => {
                const ev = d[`ev_${w}`];
                const chartId = `chart-${index}`;
                
                const row = `
                <tr class="border-b border-gray-800/50 hover:bg-emerald-500/5 transition-all group">
                    <td class="p-4">
                        <div class="font-bold text-white group-hover:text-emerald-400 transition-colors">${d.player_name}</div>
                        <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">${d.team_id || 'NBA'}</div>
                    </td>
                    <td class="p-4">
                        <div class="text-xs font-bold text-gray-300">${d.line_value} ${d.prop_type}</div>
                        <div class="text-[9px] font-black text-emerald-400 bg-emerald-900/20 inline-block px-2 py-0.5 rounded border border-emerald-500/20 mt-1 uppercase">${d.suggestion}</div>
                    </td>
                    <td class="p-4 text-center w-32">
                        <canvas id="${chartId}" class="trend-canvas" width="120" height="40"></canvas>
                    </td>
                    <td class="p-4 text-center">
                        <span class="inline-block px-2 py-1 rounded text-xs font-black bg-gray-800 border border-gray-700 text-gray-300">
                             ${d[`hits_${w}_over`] || 0} / ${w}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <div class="text-emerald-400 font-black text-sm">+${ev.toFixed(1)}%</div>
                    </td>
                </tr>`;
                tbody.innerHTML += row;

                // Create Chart after the row exists in DOM
                setTimeout(() => {
                    const trendData = d.trend_history ? d.trend_history.split(',').map(Number) : [0,0,0,0,0];
                    createSparkline(chartId, trendData);
                }, 0);
            });
        }

        function createSparkline(id, dataPoints) {
            const ctx = document.getElementById(id).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataPoints,
                    datasets: [{
                        data: dataPoints,
                        borderColor: '#10b981',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(16, 185, 129, 0.05)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        async function login() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if (data.status === 'success') {
                localStorage.setItem('role', data.role);
                localStorage.setItem('username', data.username);
                location.reload();
            } else { alert(data.message); }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        checkAuth();
    </script>
</body>
</html>
