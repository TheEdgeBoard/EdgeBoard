<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeBoard | NBA Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glow-green { text-shadow: 0 0 10px rgba(52, 211, 153, 0.4); }
        .animate-fade { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input::placeholder { color: #475569; }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-view" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl w-full max-w-md">
            <h1 class="orbitron text-3xl font-bold text-center mb-8 text-emerald-400 tracking-tighter">EDGEBOARD</h1>
            <form onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-500 text-xs font-bold mb-2 tracking-widest uppercase">Operator ID</label>
                    <input type="text" id="username" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 transition-all" placeholder="Username" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-500 text-xs font-bold mb-2 tracking-widest uppercase">Access Code</label>
                    <input type="password" id="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 transition-all" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-emerald-900/20">INITIALIZE SYSTEM</button>
                <p id="error-msg" class="text-red-500 text-center mt-4 text-xs font-bold hidden uppercase tracking-widest">Access Denied: Invalid Credentials</p>
            </form>
        </div>
    </div>

    <div id="dashboard-view" class="hidden animate-fade">
        <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <h1 class="orbitron text-2xl font-bold text-emerald-400 tracking-tighter">EDGEBOARD</h1>
                    <span id="user-badge" class="text-[10px] bg-gray-800 text-gray-400 px-2 py-0.5 rounded border border-gray-700 uppercase font-bold"></span>
                </div>
                <div class="flex gap-4">
                    <button id="admin-sync-btn" onclick="triggerSync()" class="hidden bg-emerald-600/10 hover:bg-emerald-600/20 text-emerald-400 text-xs font-bold px-4 py-2 rounded border border-emerald-500/30 transition-all">
                        🔄 RUN GLOBAL SYNC
                    </button>
                    <button onclick="logout()" class="text-gray-500 hover:text-white text-xs font-bold uppercase tracking-widest transition-colors">Terminate Session</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            
            <div id="admin-panel" class="hidden mb-8 p-8 bg-gray-900 rounded-2xl border border-emerald-500/20 shadow-2xl">
                <div class="flex items-center gap-2 mb-6">
                    <div class="h-2 w-2 rounded-full bg-emerald-500"></div>
                    <h3 class="orbitron text-xs text-emerald-400 tracking-[0.2em] uppercase font-bold">Client Onboarding (Viewer Only)</h3>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <input type="text" id="reg-fullname" placeholder="Full Client Name" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm text-white focus:border-emerald-500 outline-none">
                    <input type="email" id="reg-email" placeholder="Email Address" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm text-white focus:border-emerald-500 outline-none">
                    <input type="tel" id="reg-phone" placeholder="Phone Number" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm text-white focus:border-emerald-500 outline-none">
                    
                    <input type="text" id="reg-username" placeholder="Create Username" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm text-white focus:border-emerald-500 outline-none font-bold">
                    <input type="text" id="reg-password" placeholder="Set Temporary Password" class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm text-white focus:border-emerald-500 outline-none">
                    
                    <button onclick="createNewUser()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-emerald-900/40 uppercase text-[10px] tracking-[0.2em]">
                        Authorize Client Access
                    </button>
                </div>
                <p class="text-[10px] text-gray-500 italic">This panel saves contact information and initializes a Read-Only Viewer account.</p>
            </div>

            <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-800/50 text-gray-500 text-[10px] uppercase tracking-[0.2em] font-bold">
                            <th class="p-4">Player / Matchup</th>
                            <th class="p-4">Market Line</th>
                            <th class="p-4">Sim Project</th>
                            <th class="p-4">Win Prob</th>
                            <th class="p-4 text-right">EV Edge</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        <tr>
                            <td colspan="5" class="p-20 text-center text-gray-600 italic">
                                Connecting to secure data stream...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- 1. LOGIN ---
        async function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            const result = await response.json();

            if (response.ok && result.status === 'success') {
                sessionStorage.setItem('userRole', result.role);
                sessionStorage.setItem('userName', result.username);

                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                
                setupUI(result.role, result.username);
                loadDashboardData();
            } else {
                errorMsg.classList.remove('hidden');
            }
        }

        // --- 2. PERMISSIONS ---
        function setupUI(role, name) {
            const badge = document.getElementById('user-badge');
            const syncBtn = document.getElementById('admin-sync-btn');
            const adminPanel = document.getElementById('admin-panel');
            
            badge.innerText = `${name} | ${role}`;
            
            if (role === 'admin') {
                syncBtn.classList.remove('hidden');
                adminPanel.classList.remove('hidden');
            }
        }

        // --- 3. CREATE VIEWER ---
        async function createNewUser() {
            const payload = {
                full_name: document.getElementById('reg-fullname').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                username: document.getElementById('reg-username').value,
                password: document.getElementById('reg-password').value
            };

            if (!payload.username || !payload.password) return alert("Credentials required.");

            const response = await fetch('/api/create-user', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-User-Role': sessionStorage.getItem('userRole') 
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            alert(result.message);
            
            if (result.status === 'success') {
                document.querySelectorAll('#admin-panel input').forEach(input => input.value = '');
            }
        }

        // --- 4. DATA ENGINE ---
        async function loadDashboardData() {
            const tableBody = document.getElementById('data-table-body');
            const response = await fetch('/api/data');
            const data = await response.json();
            
            tableBody.innerHTML = '';

            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-500 italic">No edges found in the current market.</td></tr>';
                return;
            }

            data.forEach(row => {
                const edge = parseFloat(row.ev_edge);
                const edgeColor = edge > 8 ? 'text-emerald-400 glow-green' : (edge > 0 ? 'text-yellow-400' : 'text-red-400');
                
                tableBody.innerHTML += `
                    <tr class="border-b border-gray-800/50 hover:bg-gray-800/20 transition-colors">
                        <td class="p-4">
                            <div class="font-bold text-white">${row.player_name}</div>
                            <div class="text-[10px] text-gray-500 uppercase">${row.team} vs ${row.opponent}</div>
                        </td>
                        <td class="p-4 font-mono text-xs text-gray-400">
                            OVER ${row.line_value} ${row.prop_type.replace('player_', '').toUpperCase()}
                        </td>
                        <td class="p-4 text-emerald-300 font-bold">${row.projected_value}</td>
                        <td class="p-4">
                            <span class="text-white text-xs font-bold">${row.win_probability}%</span>
                            <div class="w-16 h-1 bg-gray-800 rounded-full mt-1">
                                <div class="h-full bg-emerald-500 rounded-full" style="width: ${row.win_probability}%"></div>
                            </div>
                        </td>
                        <td class="p-4 text-right font-bold text-lg ${edgeColor}">
                            ${edge > 0 ? '+' : ''}${edge}%
                        </td>
                    </tr>
                `;
            });
        }

        // --- 5. SYNC ---
        async function triggerSync() {
            const syncBtn = document.getElementById('admin-sync-btn');
            syncBtn.innerText = "⏳ PROCESSING...";
            syncBtn.disabled = true;

            const response = await fetch('/api/sync', {
                method: 'POST',
                headers: { 'X-User-Role': sessionStorage.getItem('userRole') }
            });

            const result = await response.json();
            alert(result.message);
            syncBtn.innerText = "🔄 RUN GLOBAL SYNC";
            syncBtn.disabled = false;
            loadDashboardData();
        }

        function logout() {
            sessionStorage.clear();
            window.location.reload();
        }
    </script>
</body>
</html>
