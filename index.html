<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EdgeBoard | Pro Sports Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #10b981; color: #10b981; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="orbitron text-xl font-bold text-emerald-400 tracking-tighter">EDGE BOARD</h1>
            <div class="flex gap-4 items-center">
                <span id="display-user" class="text-xs text-gray-500 font-bold uppercase"></span>
                <button onclick="logout()" id="logout-btn" class="hidden text-xs text-gray-400 hover:text-white uppercase font-bold">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="login-gate" class="text-center py-20">
            <h2 class="text-5xl font-black mb-6">BEAT THE BOOKS.</h2>
            <div class="flex justify-center gap-4">
                <button onclick="openModal('login-modal')" class="bg-emerald-500 text-black font-bold px-8 py-3 rounded-lg hover:bg-emerald-400">SIGN IN</button>
                <button onclick="openModal('reg-modal')" class="bg-gray-800 text-white font-bold px-8 py-3 rounded-lg border border-gray-700 hover:bg-gray-700">REGISTER</button>
            </div>
        </div>

        <div id="dashboard-content" class="hidden">
            <div class="flex gap-6 mb-8 border-b border-gray-800">
                <button onclick="showTab('props-tab')" id="btn-props-tab" class="tab-btn active pb-2 text-sm font-bold uppercase tracking-wider">Player Props</button>
                <button onclick="showTab('users-tab')" id="btn-users-tab" class="tab-btn hidden pb-2 text-sm font-bold uppercase tracking-wider">User Management</button>
            </div>

            <div id="props-tab" class="tab-content active">
                <div class="flex gap-2 mb-6">
                    <button onclick="triggerSync('odds')" class="bg-blue-600 text-[10px] font-bold px-4 py-2 rounded">SYNC ODDS</button>
                    <button onclick="triggerSync('stats')" class="bg-emerald-600 text-[10px] font-bold px-4 py-2 rounded">SYNC STATS</button>
                </div>
                <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-2xl">
                    <table class="w-full text-left">
                        <thead class="bg-gray-800/50 text-[10px] uppercase text-gray-500 tracking-widest">
                            <tr>
                                <th class="p-5">Player</th>
                                <th class="p-5">Market & Line</th>
                                <th class="p-5 text-center">Sim Prob</th>
                                <th class="p-5 text-center">Recent</th>
                                <th class="p-5 text-right">EV Edge</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="users-tab" class="tab-content">
                <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-2xl">
                    <table class="w-full text-left">
                        <thead class="bg-gray-800/50 text-[10px] uppercase text-gray-500 tracking-widest">
                            <tr>
                                <th class="p-5">Username</th>
                                <th class="p-5">Password</th>
                                <th class="p-5">Role</th>
                                <th class="p-5 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="orbitron text-lg mb-6 tracking-tighter">Welcome Back</h3>
            <input id="l-user" type="text" placeholder="Username" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white">
            <input id="l-pass" type="password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-6 text-white">
            <button onclick="auth('login')" class="w-full bg-emerald-500 text-black font-bold py-3 rounded">SIGN IN</button>
            <button onclick="closeModal('login-modal')" class="w-full text-gray-500 text-xs mt-4">Cancel</button>
        </div>
    </div>

    <div id="reg-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <h3 class="orbitron text-lg mb-6">Request Access</h3>
        <input id="r-name" type="text" placeholder="Full Name" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white">
        <input id="r-email" type="email" placeholder="Email Address" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white">
        <input id="r-user" type="text" placeholder="Requested Username" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-6 text-white">
        <button onclick="requestAccess()" class="w-full bg-blue-600 text-white font-bold py-3 rounded">SUBMIT REQUEST</button>
        <button onclick="closeModal('reg-modal')" class="w-full text-gray-500 text-xs mt-4">Cancel</button>
        </div>
    </div>
    <script>
        async function requestAccess() {
            const payload = {
                full_name: document.getElementById('r-name').value,
                email: document.getElementById('r-email').value,
                requested_username: document.getElementById('r-user').value
            };
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            alert(data.message);
            if(data.status === 'success') closeModal('reg-modal');
            }
        async function auth(type) {
            const user = document.getElementById(type === 'login' ? 'l-user' : 'r-user').value;
            const pass = document.getElementById(type === 'login' ? 'l-pass' : 'r-pass').value;
            const res = await fetch(`/api/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if(data.status === 'success') {
                if(type === 'login') {
                    localStorage.setItem('user', user);
                    localStorage.setItem('role', data.role);
                    location.reload();
                } else {
                    alert("Registered! Please Sign In.");
                    closeModal('reg-modal');
                }
            } else { alert(data.message); }
        }

        function checkAuth() {
            const user = localStorage.getItem('user');
            const role = localStorage.getItem('role');
            if(user) {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                document.getElementById('display-user').innerText = user;
                if(role === 'admin') {
                    document.getElementById('btn-users-tab').classList.remove('hidden');
                    loadUsers();
                }
                loadData();
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        async function loadData() {
            const res = await fetch('/api/data');
            const data = await res.json();
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            data.forEach(d => {
                const prob = (d.win_rate_10 * 100).toFixed(1);
                body.innerHTML += `
                    <tr class="border-b border-gray-800 hover:bg-emerald-500/5">
                        <td class="p-5 font-bold text-white">${d.player_name}</td>
                        <td class="p-5">
                            <div class="text-[10px] text-gray-500 uppercase font-black">${d.prop_type}</div>
                            <div class="text-sm font-bold text-emerald-400">${d.suggestion} ${d.market_line}</div>
                        </td>
                        <td class="p-5 text-center"><div class="text-xl font-black orbitron text-blue-400">${prob}%</div></td>
                        <td class="p-5 text-center text-[11px] font-mono text-gray-500">${d.trend_history || '---'}</td>
                        <td class="p-5 text-right font-black text-emerald-400">+${(d.ev_10 || 0).toFixed(1)}%</td>
                    </tr>`;
            });
        }

        async function loadUsers() {
            const role = localStorage.getItem('role');
            const res = await fetch(`/api/admin/users?role=${role}`);
            const data = await res.json();
            const body = document.getElementById('user-table-body');
            body.innerHTML = '';
            data.forEach(u => {
                body.innerHTML += `
                    <tr class="border-b border-gray-800">
                        <td class="p-5 text-white">${u.username}</td>
                        <td class="p-5 text-gray-400">${u.password}</td>
                        <td class="p-5 text-xs uppercase font-bold text-gray-500">${u.role}</td>
                        <td class="p-5 text-right">
                            <button onclick="deleteUser('${u.username}')" class="text-red-500 text-xs font-bold hover:underline">DELETE</button>
                        </td>
                    </tr>`;
            });
        }

        async function deleteUser(username) {
            if(confirm('Delete ' + username + '?')) {
                await fetch('/api/admin/delete-user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username})
                });
                loadUsers();
            }
        }

        async function triggerSync(type) {
            const res = await fetch(`/api/sync/${type}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            loadData();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
        checkAuth();
    </script>
</body>
</html>
