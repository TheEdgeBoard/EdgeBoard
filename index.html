<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EdgeBoard | Pro Sports Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="orbitron text-xl font-bold text-emerald-400 tracking-tighter">EDGE BOARD</h1>
            <div id="user-controls" class="flex gap-4 items-center">
                <span id="display-user" class="text-xs text-gray-500 font-bold uppercase"></span>
                <button onclick="openModal('pw-modal')" id="pw-btn" class="hidden text-[10px] text-blue-400 hover:underline uppercase">Change PW</button>
                <button onclick="logout()" id="logout-btn" class="hidden text-xs text-gray-400 hover:text-white uppercase font-bold">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="login-gate" class="text-center py-20">
            <h2 class="text-5xl font-black mb-6 tracking-tight">BEAT THE BOOKS.</h2>
            <p class="text-gray-400 mb-10 max-w-md mx-auto">Access 10,000+ Monte Carlo simulations and EV edges for every NBA player prop.</p>
            <div class="flex justify-center gap-4">
                <button onclick="openModal('login-modal')" class="bg-emerald-500 text-black font-bold px-8 py-3 rounded-lg hover:bg-emerald-400 transition-all">SIGN IN</button>
                <button onclick="openModal('reg-modal')" class="bg-gray-800 text-white font-bold px-8 py-3 rounded-lg border border-gray-700 hover:bg-gray-700 transition-all">REGISTER</button>
            </div>
        </div>

        <div id="dashboard-content" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <div class="flex gap-2">
                    <button onclick="triggerSync('odds')" class="bg-blue-600 hover:bg-blue-500 text-[10px] font-bold px-4 py-2 rounded transition-colors">SYNC ODDS</button>
                    <button onclick="triggerSync('stats')" class="bg-emerald-600 hover:bg-emerald-500 text-[10px] font-bold px-4 py-2 rounded transition-colors">SYNC STATS</button>
                </div>
            </div>

            <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-800/50 text-[10px] uppercase text-gray-500 tracking-[0.2em]">
                        <tr>
                            <th class="p-5">Player</th>
                            <th class="p-5">Market & Line</th>
                            <th class="p-5 text-center">Sim Probability</th>
                            <th class="p-5 text-center">Recent Scores</th>
                            <th class="p-5 text-right">EV Edge</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="reg-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="orbitron text-lg mb-6">Create Account</h3>
            <input id="r-user" type="text" placeholder="Username" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white outline-none focus:border-emerald-500">
            <input id="r-pass" type="password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-6 text-white outline-none focus:border-emerald-500">
            <button onclick="auth('register')" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-500 transition-colors">REGISTER</button>
            <button onclick="closeModal('reg-modal')" class="w-full text-gray-500 text-xs mt-4 hover:text-white">Cancel</button>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="orbitron text-lg mb-6">Welcome Back</h3>
            <input id="l-user" type="text" placeholder="Username" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white outline-none focus:border-emerald-500">
            <input id="l-pass" type="password" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-6 text-white outline-none focus:border-emerald-500">
            <button onclick="auth('login')" class="w-full bg-emerald-500 text-black font-bold py-3 rounded hover:bg-emerald-400 transition-colors">SIGN IN</button>
            <button onclick="closeModal('login-modal')" class="w-full text-gray-500 text-xs mt-4 hover:text-white">Cancel</button>
        </div>
    </div>

    <div id="pw-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-full max-w-sm">
            <h3 class="orbitron text-lg mb-6 text-blue-400">Security Update</h3>
            <input id="p-old" type="password" placeholder="Current Password" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-3 text-white">
            <input id="p-new" type="password" placeholder="New Password" class="w-full bg-gray-800 border border-gray-700 p-3 rounded mb-6 text-white">
            <button onclick="changePW()" class="w-full bg-blue-600 text-white font-bold py-3 rounded">UPDATE PASSWORD</button>
            <button onclick="closeModal('pw-modal')" class="w-full text-gray-500 text-xs mt-4">Cancel</button>
        </div>
    </div>

    <script>
        async function auth(type) {
            const user = document.getElementById(type === 'login' ? 'l-user' : 'r-user').value;
            const pass = document.getElementById(type === 'login' ? 'l-pass' : 'r-pass').value;
            const res = await fetch(`/api/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if(data.status === 'success') {
                if(type === 'login') {
                    localStorage.setItem('user', user);
                    location.reload();
                } else {
                    alert("Account created! Please sign in.");
                    closeModal('reg-modal');
                }
            } else { alert(data.message); }
        }

        function checkAuth() {
            const user = localStorage.getItem('user');
            if(user) {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                document.getElementById('pw-btn').classList.remove('hidden');
                document.getElementById('display-user').innerText = user;
                loadData();
            }
        }

        async function loadData() {
            const res = await fetch('/api/data');
            const data = await res.json();
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            
            data.forEach(d => {
                const prob = (d.win_rate_10 * 100).toFixed(1);
                body.innerHTML += `
                    <tr class="border-b border-gray-800 hover:bg-emerald-500/5 transition-colors">
                        <td class="p-5 font-bold text-white">${d.player_name}</td>
                        <td class="p-5">
                            <div class="text-[10px] text-gray-500 uppercase font-black">${d.prop_type}</div>
                            <div class="text-sm font-bold text-emerald-400">${d.suggestion} ${d.market_line}</div>
                        </td>
                        <td class="p-5 text-center">
                            <div class="text-xl font-black orbitron text-blue-400">${prob}%</div>
                        </td>
                        <td class="p-5 text-center text-[11px] font-mono text-gray-500 tracking-tighter">${d.trend_history || '---'}</td>
                        <td class="p-5 text-right">
                            <div class="text-emerald-400 font-black">+${(d.ev_10 || 0).toFixed(1)}%</div>
                        </td>
                    </tr>`;
            });
        }

        async function triggerSync(type) {
            const res = await fetch(`/api/sync/${type}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            loadData();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
        async function changePW() { /* Logic same as previous version */ }
        checkAuth();
    </script>
</body>
</html>
