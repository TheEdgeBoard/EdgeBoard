<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EdgeBoard | CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-10">

    <div id="login-view" class="max-w-md mx-auto bg-gray-900 p-8 rounded-xl border border-gray-800">
        <h2 class="text-2xl font-bold mb-6 text-emerald-400">EDGEBOARD LOGIN</h2>
        <input type="text" id="username" placeholder="Username" class="w-full bg-gray-800 p-3 mb-4 rounded">
        <input type="password" id="password" placeholder="Password" class="w-full bg-gray-800 p-3 mb-6 rounded">
        <button onclick="handleLogin()" class="w-full bg-emerald-600 p-3 rounded font-bold">LOGIN</button>
    </div>

    <div id="dashboard-view" class="hidden">
        <div class="flex justify-between mb-10">
            <h1 class="text-3xl font-bold text-emerald-400">ADMIN DASHBOARD</h1>
            <button onclick="location.reload()" class="text-gray-500">Logout</button>
        </div>

        <div id="admin-panel" class="bg-gray-900 p-8 rounded-xl border border-emerald-500/20 mb-10">
            <h3 class="text-emerald-400 mb-6 uppercase text-sm tracking-widest">Onboard New Client</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="reg-fullname" placeholder="Full Name" class="bg-gray-800 p-3 rounded">
                <input type="email" id="reg-email" placeholder="Email" class="bg-gray-800 p-3 rounded">
                <input type="text" id="reg-username" placeholder="Username" class="bg-gray-800 p-3 rounded">
                <input type="text" id="reg-password" placeholder="Password" class="bg-gray-800 p-3 rounded">
                <button onclick="createNewUser()" class="bg-emerald-600 p-3 rounded font-bold md:col-span-2">SEND ACTIVATION CODE</button>
            </div>
        </div>
    </div>

    <div id="verify-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-gray-900 p-8 rounded-2xl border border-emerald-500 w-full max-w-sm text-center">
            <h2 class="text-xl font-bold mb-4">Enter Code</h2>
            <p class="text-gray-400 text-sm mb-6">A 6-digit code was sent to the client's email.</p>
            <input type="text" id="verify-code" placeholder="000000" class="w-full bg-gray-800 p-4 text-center text-2xl tracking-widest rounded mb-4">
            <button onclick="confirmCode()" class="w-full bg-emerald-600 p-3 rounded font-bold">ACTIVATE ACCOUNT</button>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if (data.status === 'success') {
                sessionStorage.setItem('userRole', data.role);
                sessionStorage.setItem('currentRegUser', ''); // Reset
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
            }
        }

        async function createNewUser() {
            const payload = {
                full_name: document.getElementById('reg-fullname').value,
                email: document.getElementById('reg-email').value,
                username: document.getElementById('reg-username').value,
                password: document.getElementById('reg-password').value,
                phone: "" // Optional
            };
            
            // Save the username locally so we know who we are verifying
            sessionStorage.setItem('currentRegUser', payload.username);

            const res = await fetch('/api/create-user', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Role': sessionStorage.getItem('userRole')
                },
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            if (data.status === 'pending') {
                document.getElementById('verify-modal').classList.remove('hidden');
            } else {
                alert(data.message);
            }
        }

        async function confirmCode() {
            const username = sessionStorage.getItem('currentRegUser');
            const code = document.getElementById('verify-code').value;

            const res = await fetch('/api/verify-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, code})
            });

            const data = await res.json();
            alert(data.message);
            if (data.status === 'success') {
                location.reload();
            }
        }
    </script>
</body>
</html>
