<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - User Management</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #f4f4f9; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; word-break: break-all; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-delete {
            background-color: #dc3545; color: white; border: none;
            padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .btn-delete:hover { background-color: #c82333; }
        .back-link { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Dashboard</a>
        <h2>Manage Users</h2>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">ID</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Username</th>
                    <th>Access</th>
                    <th>Password Hash</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user[0] }}</td> <td>{{ user[1] }}</td> <td>{{ user[2] }}</td> <td>{{ user[3] }}</td> <td>{{ user[4] }}</td> <td style="font-family: monospace; font-size: 0.8em; color: #666;">
                        {{ user[5] }}
                    </td> <td>
                        <form action="{{ url_for('delete_user', user_id=user[0]) }}" method="POST" onsubmit="return confirm('PERMANENTLY DELETE user {{ user[3] }}?');">
                            <button type="submit" class="btn-delete">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
